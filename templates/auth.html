<!DOCTYPE html>
<html lang="zh-TW" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — ETF 投資管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
  <style>
    .google-btn {
      display:flex; align-items:center; justify-content:center; gap:12px;
      width:100%; padding:13px 24px; border-radius:12px;
      background:#fff; border:2px solid #e2e8f0;
      font-weight:600; font-size:1rem; color:#374151;
      cursor:pointer; transition:all 0.2s; box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .google-btn:hover { border-color:#4285f4; box-shadow:0 4px 16px rgba(66,133,244,0.2); transform:translateY(-1px); }
    .dark .google-btn { background:#1e293b; border-color:#334155; color:#f1f5f9; }
    .dark .google-btn:hover { border-color:#6366f1; }
    .google-logo { width:24px; height:24px; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 text-white mb-4 shadow-lg">
      <i class="fas fa-chart-line text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">ETF 投資管理系統</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">智慧追蹤 · 精準分析 · 輕鬆管理</p>
  </div>

  <!-- 登入卡片 -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-100 dark:border-slate-700">
    <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-2">歡迎回來</h2>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">使用 Google 帳號登入，安全便捷</p>

    <!-- URL 錯誤訊息 -->
    <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm"></div>

    <!-- Google 登入按鈕 -->
    {% if google_enabled %}
    <a href="/api/auth/google/login" class="google-btn mb-4">
      <svg class="google-logo" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      使用 Google 帳號登入
    </a>
    {% else %}
    <div class="mb-4 p-3 bg-yellow-50 dark:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-700 rounded-lg text-yellow-700 dark:text-yellow-400 text-sm">
      <i class="fas fa-exclamation-triangle mr-2"></i>
      Google OAuth 尚未設定。請在 <code>.env</code> 加入 <code>GOOGLE_CLIENT_ID</code> 與 <code>GOOGLE_CLIENT_SECRET</code>。
      <a href="https://console.cloud.google.com" target="_blank" class="underline ml-1">前往設定</a>
    </div>
    <!-- 開發模式：帳密登入 -->
    <div id="dev-login" class="space-y-3">
      <p class="text-xs text-slate-400 text-center mb-3">— 開發模式（帳密登入）—</p>
      <input type="email" id="dev-email" placeholder="Email" class="input">
      <input type="password" id="dev-password" placeholder="密碼" class="input">
      <button onclick="devLogin()" class="btn-primary w-full justify-center">
        <i class="fas fa-sign-in-alt"></i>登入
      </button>
      <button onclick="showRegister()" class="w-full text-center text-sm text-indigo-500 hover:text-indigo-700 mt-1">還沒有帳號？立即註冊</button>
    </div>
    <div id="dev-register" class="hidden space-y-3">
      <p class="text-xs text-slate-400 text-center mb-3">— 開發模式（帳號註冊）—</p>
      <input type="text" id="dev-username" placeholder="使用者名稱（至少2字元）" class="input">
      <input type="email" id="dev-email2" placeholder="Email" class="input">
      <input type="password" id="dev-password2" placeholder="密碼（至少 8 字元）" class="input">
      <button onclick="devRegister()" class="btn-primary w-full justify-center">
        <i class="fas fa-user-plus"></i>註冊
      </button>
      <button onclick="showLogin()" class="w-full text-center text-sm text-indigo-500 hover:text-indigo-700 mt-1">已有帳號？登入</button>
    </div>
    {% endif %}

    <!-- 分隔線 -->
    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
      <span class="text-xs text-slate-400">安全登入</span>
      <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
    </div>

    <!-- 安全說明 -->
    <div class="space-y-2">
      <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
        <i class="fas fa-shield-alt text-green-500"></i>
        <span>使用 Google 帳號，無需記住額外密碼</span>
      </div>
      <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
        <i class="fas fa-lock text-blue-500"></i>
        <span>JWT 加密傳輸，資料安全保護</span>
      </div>
      <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
        <i class="fas fa-user-shield text-purple-500"></i>
        <span>個人資料與投資紀錄完全隔離</span>
      </div>
    </div>
  </div>

  <!-- 回首頁 -->
  <div class="text-center mt-4">
    <a href="/" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 text-sm">
      <i class="fas fa-arrow-left mr-1"></i>回首頁
    </a>
  </div>
</div>

<script src="/static/js/common.js"></script>
<script>
  // 從 URL 讀取錯誤
  const urlParams = new URLSearchParams(window.location.search);
  const err = urlParams.get('error');
  if (err) {
    const msgs = {
      'oauth_failed': 'Google 登入失敗，請重試',
      'no_email': '無法取得 Google 帳號信箱',
      'cancelled': '已取消登入',
    };
    const box = document.getElementById('error-msg');
    if (box) {
      box.textContent = msgs[err] || `登入失敗：${err}`;
      box.classList.remove('hidden');
    }
  }

  // 如果已登入，跳轉首頁
  if (Auth.isLoggedIn()) {
    window.location.href = '/';
  }

  // 開發模式登入
  async function devLogin() {
    const email = document.getElementById('dev-email')?.value;
    const password = document.getElementById('dev-password')?.value;
    if (!email || !password) return showToast('請輸入 Email 和密碼', false);
    const data = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',   // 確保伺服器設定的 HttpOnly cookie 被保存
      body: JSON.stringify({email, password})
    }).then(r => r.json());
    if (data.status === 'success') {
      // Token 已由伺服器寫入 HttpOnly cookie，無需客戶端儲存
      Auth.setToken(null);
      showToast('登入成功！');
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showToast(data.message || '登入失敗', false);
    }
  }

  async function devRegister() {
    const username = document.getElementById('dev-username')?.value;
    const email = document.getElementById('dev-email2')?.value;
    const password = document.getElementById('dev-password2')?.value;
    if (!username || !email || !password) return showToast('請填寫所有欄位', false);
    if (password.length < 8) return showToast('密碼至少需要 8 字元', false);
    const data = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',   // 確保伺服器設定的 HttpOnly cookie 被保存
      body: JSON.stringify({username, email, password})
    }).then(r => r.json());
    if (data.status === 'success') {
      Auth.setToken(null);
      showToast('註冊成功！');
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showToast(data.message || '註冊失敗', false);
    }
  }

  function showRegister() {
    document.getElementById('dev-login').classList.add('hidden');
    document.getElementById('dev-register').classList.remove('hidden');
  }

  function showLogin() {
    document.getElementById('dev-register').classList.add('hidden');
    document.getElementById('dev-login').classList.remove('hidden');
  }
</script>
</body>
</html>
