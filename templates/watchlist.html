<!DOCTYPE html>
<html lang="zh-TW" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自選股 — ETF 投資管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-900 pb-mobile">

<nav class="navbar">
  <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a href="/" class="flex items-center gap-2 font-bold text-indigo-600 dark:text-indigo-400 text-base">
        <i class="fas fa-chart-line"></i>ETF投資系統
      </a>
      <div class="hidden md:flex gap-1">
        <a href="/etf-list"  class="px-3 py-1.5 text-sm rounded-md text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-indigo-600 dark:hover:text-indigo-400">ETF精選</a>
        <a href="/watchlist" class="px-3 py-1.5 text-sm rounded-md bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 font-medium">自選股</a>
        <a href="/backtest"  class="px-3 py-1.5 text-sm rounded-md text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-indigo-600">回測</a>
        <a href="/portfolio" class="px-3 py-1.5 text-sm rounded-md text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-indigo-600">庫存</a>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="toggleDarkMode()" id="dark-toggle" class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700"><i class="fas fa-moon"></i></button>
      <div id="user-area"></div>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold text-slate-800 dark:text-white">我的自選股</h1>
      <p id="update-time" class="text-xs text-slate-400 mt-0.5">追蹤您關注的 ETF</p>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <div class="flex bg-slate-100 dark:bg-slate-700 rounded-lg p-0.5">
        <button id="btn-all" onclick="switchMarket('all')" class="market-btn px-4 py-1.5 rounded-md text-sm font-semibold bg-white dark:bg-slate-600 text-slate-800 dark:text-white shadow-sm">全部</button>
        <button id="btn-TW"  onclick="switchMarket('TW')"  class="market-btn px-4 py-1.5 rounded-md text-sm font-semibold text-slate-400 dark:text-slate-300">台股</button>
        <button id="btn-US"  onclick="switchMarket('US')"  class="market-btn px-4 py-1.5 rounded-md text-sm font-semibold text-slate-400 dark:text-slate-300">美股</button>
      </div>
      <button onclick="openCsvModal()" class="px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all">
        <i class="fas fa-file-import text-xs mr-1"></i>CSV 匯入
      </button>
      <button onclick="openAddModal()" class="btn-primary text-sm py-2 px-3">
        <i class="fas fa-plus text-xs"></i>新增
      </button>
    </div>
  </div>

  <!-- 登入提示 -->
  <div id="login-prompt" class="hidden card py-16 text-center">
    <i class="fas fa-lock text-3xl text-slate-300 dark:text-slate-600 mb-3 block"></i>
    <p class="text-slate-500 dark:text-slate-400 mb-4">請先登入以查看自選股</p>
    <a href="/auth" class="btn-primary inline-flex">前往登入</a>
  </div>

  <!-- 空狀態 -->
  <div id="empty-state" class="hidden card py-16 text-center">
    <i class="fas fa-star text-3xl text-slate-200 dark:text-slate-700 mb-3 block"></i>
    <p class="text-slate-600 dark:text-slate-300 mb-1 font-medium">尚未加入自選股</p>
    <p class="text-slate-400 text-sm mb-4">從 ETF 精選或搜尋頁面加入</p>
    <button onclick="openAddModal()" class="btn-primary inline-flex">
      <i class="fas fa-plus mr-1.5"></i>新增自選股
    </button>
  </div>

  <!-- 表格 -->
  <div id="table-wrap" class="card overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100 dark:border-slate-700 text-xs font-medium text-slate-400 uppercase tracking-wide">
            <th class="px-4 py-3 text-left">ETF</th>
            <th class="px-4 py-3 text-right">現價</th>
            <th class="px-4 py-3 text-right">漲跌幅</th>
            <th class="px-4 py-3 text-right hide-mobile">今日高低</th>
            <th class="px-4 py-3 text-right hide-mobile">殖利率</th>
            <th class="px-4 py-3 w-16"></th>
          </tr>
        </thead>
        <tbody id="watchlist-body">
          <tr><td colspan="6" class="px-4 py-14 text-center text-slate-400 text-sm">
            <span class="spinner mr-2"></span>載入中…
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="/"><i class="fas fa-home"></i>首頁</a>
  <a href="/etf-list"><i class="fas fa-chart-bar"></i>ETF</a>
  <a href="/watchlist" class="active"><i class="fas fa-star"></i>自選</a>
  <a href="/portfolio"><i class="fas fa-wallet"></i>庫存</a>
  <a href="/profile"><i class="fas fa-user"></i>我的</a>
</nav>

<!-- 新增 Modal -->
<div id="addModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
  <div class="card w-full max-w-sm p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-slate-800 dark:text-white">新增自選股</h3>
      <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"><i class="fas fa-times"></i></button>
    </div>
    <input type="text" id="add-ticker" placeholder="輸入代碼，例：0050 或 QQQ"
      class="input mb-1 uppercase">
    <p class="text-xs text-slate-400 mb-4">支援台股（0050）與美股（SPY）所有 ETF</p>
    <div class="flex gap-2">
      <button id="add-confirm-btn" onclick="addToWatchlist()" class="btn-primary flex-1 justify-center">確認新增</button>
      <button onclick="closeAddModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2 px-4 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600">取消</button>
    </div>
  </div>
</div>

<!-- CSV 匯入 Modal -->
<div id="csvModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
  <div class="card w-full max-w-md p-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-slate-800 dark:text-white">CSV 批次匯入自選股</h3>
      <button onclick="closeCsvModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"><i class="fas fa-times"></i></button>
    </div>

    <!-- 說明 -->
    <div class="bg-slate-50 dark:bg-slate-800 rounded-lg p-3 mb-4 text-xs text-slate-500 dark:text-slate-400 space-y-1">
      <p class="font-medium text-slate-600 dark:text-slate-300">CSV 格式說明</p>
      <p>必要欄位：<code class="bg-white dark:bg-slate-700 px-1 rounded">代碼</code>（或 <code class="bg-white dark:bg-slate-700 px-1 rounded">ticker</code>）</p>
      <p>每行一個代碼，例：<code class="bg-white dark:bg-slate-700 px-1 rounded">0050, 00878, SPY</code></p>
      <p class="text-slate-400">支援 UTF-8 / Big5 編碼，無標題行時自動讀第一欄</p>
    </div>

    <!-- 上傳區 -->
    <label id="csv-drop-zone" class="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 dark:border-slate-600 rounded-xl py-8 cursor-pointer hover:border-indigo-400 transition-colors mb-4">
      <i class="fas fa-cloud-upload-alt text-2xl text-slate-300 dark:text-slate-600 mb-2"></i>
      <span class="text-sm text-slate-400" id="csv-filename">點擊選擇 CSV 檔案</span>
      <input type="file" id="csv-file-input" accept=".csv,.txt" class="hidden" onchange="onCsvFileSelect(this)">
    </label>

    <!-- 預覽/結果 -->
    <div id="csv-preview" class="hidden mb-4 text-xs text-slate-500 dark:text-slate-400">
      <span id="csv-preview-text"></span>
    </div>
    <div id="csv-result" class="hidden mb-4"></div>

    <div class="flex gap-2">
      <button id="csv-import-btn" onclick="doCsvImport()" class="btn-primary flex-1 justify-center" disabled>
        <i class="fas fa-file-import mr-1.5"></i>開始匯入
      </button>
      <button onclick="closeCsvModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-2 px-4 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-600">取消</button>
    </div>
  </div>
</div>

<script src="/static/js/common.js"></script>
<script>
let currentMarket = 'all', watchlistData = [];

const FREQ_BADGE = {
  '月配':  'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
  '雙月配':'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/40 dark:text-cyan-300',
  '季配':  'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
  '半年配':'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
  '年配':  'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300',
  '不配息':'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400',
};

async function loadWatchlist() {
  if (!Auth.isLoggedIn()) {
    document.getElementById('login-prompt').classList.remove('hidden');
    document.getElementById('table-wrap').classList.add('hidden');
    return;
  }
  const data = await Auth.fetchJson('/api/watchlist');
  if (!data) return;
  watchlistData = data.data || [];
  document.getElementById('update-time').textContent = `更新於 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}`;
  renderWatchlist();
}

function switchMarket(m) {
  currentMarket = m;
  const on  = 'market-btn px-4 py-1.5 rounded-md text-sm font-semibold bg-white dark:bg-slate-600 text-slate-800 dark:text-white shadow-sm transition-all';
  const off = 'market-btn px-4 py-1.5 rounded-md text-sm font-semibold text-slate-400 dark:text-slate-300 transition-all';
  ['all','TW','US'].forEach(k => {
    document.getElementById('btn-'+k).className = (k === m) ? on : off;
  });
  renderWatchlist();
}

function renderWatchlist() {
  const tbody = document.getElementById('watchlist-body');
  const empty = document.getElementById('empty-state');
  const wrap  = document.getElementById('table-wrap');

  if (!watchlistData.length) {
    wrap.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }
  const rows = currentMarket === 'all' ? watchlistData : watchlistData.filter(d => d.market === currentMarket);
  wrap.classList.remove('hidden');
  empty.classList.add('hidden');

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-14 text-center text-slate-400 text-sm">此市場無自選股</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(item => {
    const chg = item.price_change_percent || 0;
    const up  = chg >= 0;
    const chgCls = up ? 'text-red-500' : 'text-green-500';
    const price  = item.current_price ? item.current_price.toFixed(2) : '-';
    const high   = item.day_high ? item.day_high.toFixed(2) : '-';
    const low    = item.day_low  ? item.day_low.toFixed(2)  : '-';
    const yld    = item.dividend_yield ? item.dividend_yield.toFixed(2)+'%' : '-';
    const bCls   = FREQ_BADGE[item.payout_freq] || 'bg-slate-100 text-slate-400';
    const freqTag = item.payout_freq ? `<span class="text-[11px] px-1.5 py-0.5 rounded font-medium ${bCls} ml-1">${item.payout_freq}</span>` : '';
    return `
    <tr class="table-row cursor-pointer animate-fade-in" onclick="location.href='/etf-detail/${item.ticker}'">
      <td class="px-4 py-3.5">
        <div class="flex items-center gap-1 flex-wrap">
          <span class="font-bold text-indigo-600 dark:text-indigo-400">${item.ticker}</span>
          ${freqTag}
          <span class="text-[11px] text-slate-400 dark:text-slate-500">${item.market==='TW'?'台股':'美股'}</span>
        </div>
        <div class="text-xs text-slate-400 mt-0.5 truncate max-w-[180px]">${item.name||''}</div>
      </td>
      <td class="px-4 py-3.5 text-right font-semibold text-slate-800 dark:text-slate-200 tabular-nums">${price}</td>
      <td class="px-4 py-3.5 text-right font-semibold tabular-nums ${chgCls}">${up?'+':''}${chg.toFixed(2)}%</td>
      <td class="px-4 py-3.5 text-right text-xs text-slate-500 dark:text-slate-400 hide-mobile tabular-nums">
        <span class="text-red-400">${high}</span> / <span class="text-green-500">${low}</span>
      </td>
      <td class="px-4 py-3.5 text-right text-emerald-600 dark:text-emerald-400 hide-mobile tabular-nums">${yld}</td>
      <td class="px-4 py-3.5 text-center" onclick="event.stopPropagation()">
        <button data-ticker="${item.ticker}" onclick="removeFromWatchlist(this.dataset.ticker)"
          class="w-7 h-7 rounded-md text-slate-300 dark:text-slate-600 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-400 transition-colors inline-flex items-center justify-center">
          <i class="fas fa-trash text-xs"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

function openAddModal() {
  if (!Auth.isLoggedIn()) { showToast('請先登入', false); setTimeout(()=>location.href='/auth',1000); return; }
  document.getElementById('add-ticker').value = '';
  document.getElementById('addModal').style.display = 'flex';
}
function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

async function addToWatchlist() {
  const ticker = document.getElementById('add-ticker').value.trim().toUpperCase();
  if (!ticker) { showToast('請輸入代碼', false); return; }
  const btn = document.getElementById('add-confirm-btn');
  btn.textContent = '處理中…'; btn.disabled = true;
  const data = await Auth.fetchJson('/api/watchlist/add', {
    method: 'POST',
    body: JSON.stringify({ ticker })
  });
  btn.textContent = '確認新增'; btn.disabled = false;
  if (data?.status === 'success') { showToast(`已加入 ${ticker}`); closeAddModal(); loadWatchlist(); }
  else showToast(data?.message || '加入失敗', false);
}

async function removeFromWatchlist(ticker) {
  if (!confirm(`確定移除 ${ticker}？`)) return;
  const data = await Auth.fetchJson(`/api/watchlist/remove/${ticker}`, { method: 'DELETE' });
  if (data?.status === 'success') { showToast(`已移除 ${ticker}`); loadWatchlist(); }
  else showToast(data?.message || '移除失敗', false);
}

document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
document.getElementById('csvModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCsvModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeAddModal(); closeCsvModal(); } });

// ── CSV 匯入 ──
let _csvTickers = [];

function openCsvModal() {
  if (!Auth.isLoggedIn()) { showToast('請先登入', false); setTimeout(()=>location.href='/auth',1000); return; }
  _csvTickers = [];
  document.getElementById('csv-filename').textContent = '點擊選擇 CSV 檔案';
  document.getElementById('csv-file-input').value = '';
  document.getElementById('csv-preview').classList.add('hidden');
  document.getElementById('csv-result').classList.add('hidden');
  document.getElementById('csv-import-btn').disabled = true;
  document.getElementById('csvModal').style.display = 'flex';
}
function closeCsvModal() { document.getElementById('csvModal').style.display = 'none'; }

function onCsvFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('csv-filename').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    _csvTickers = parseCsvTickers(text);
    const preview = document.getElementById('csv-preview');
    const previewText = document.getElementById('csv-preview-text');
    if (_csvTickers.length > 0) {
      previewText.textContent = `讀取到 ${_csvTickers.length} 個代碼：${_csvTickers.slice(0,8).join('、')}${_csvTickers.length > 8 ? '…' : ''}`;
      preview.classList.remove('hidden');
      document.getElementById('csv-import-btn').disabled = false;
    } else {
      previewText.textContent = '⚠️ 未讀取到有效代碼，請確認 CSV 格式';
      preview.classList.remove('hidden');
      document.getElementById('csv-import-btn').disabled = true;
    }
    document.getElementById('csv-result').classList.add('hidden');
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCsvTickers(text) {
  const lines = text.replace(/\r/g, '').split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];
  // 判斷是否有標題行（包含 "代碼" 或 "ticker"）
  const header = lines[0].toLowerCase();
  const hasHeader = header.includes('代碼') || header.includes('ticker') || header.includes('symbol');
  const dataLines = hasHeader ? lines.slice(1) : lines;
  const tickers = [];
  for (const line of dataLines) {
    const cols = line.split(',');
    // 找第一個看起來像 ETF 代碼的欄位
    for (const col of cols) {
      const val = col.trim().toUpperCase().replace(/['"]/g, '');
      if (val && /^[A-Z0-9]{2,10}$/.test(val)) {
        tickers.push(val);
        break;
      }
    }
  }
  return [...new Set(tickers)]; // 去重
}

async function doCsvImport() {
  if (!_csvTickers.length) return;
  const btn = document.getElementById('csv-import-btn');
  btn.textContent = '匯入中…'; btn.disabled = true;

  const formData = new FormData();
  const blob = new Blob([_csvTickers.join('\n')], { type: 'text/plain' });
  formData.append('file', blob, 'tickers.csv');

  let result;
  try {
    const resp = await fetch('/api/watchlist/import-csv', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${Auth.getToken()}` },
      body: formData,
    });
    result = await resp.json();
  } catch(e) {
    showToast('網路錯誤，請稍後再試', false);
    btn.innerHTML = '<i class="fas fa-file-import mr-1.5"></i>開始匯入'; btn.disabled = false;
    return;
  }

  const div = document.getElementById('csv-result');
  if (result.status === 'success') {
    const { added, skipped, total } = result;
    div.innerHTML = `<div class="rounded-lg p-3 bg-emerald-50 dark:bg-emerald-900/20 text-sm text-emerald-700 dark:text-emerald-300">
      ✅ 匯入完成：新增 <strong>${added}</strong> 支，已存在 ${skipped} 支（共 ${total} 支）
    </div>`;
    div.classList.remove('hidden');
    loadWatchlist();
  } else {
    div.innerHTML = `<div class="rounded-lg p-3 bg-red-50 dark:bg-red-900/20 text-sm text-red-600 dark:text-red-400">❌ ${result.message || '匯入失敗'}</div>`;
    div.classList.remove('hidden');
  }
  btn.innerHTML = '<i class="fas fa-file-import mr-1.5"></i>開始匯入'; btn.disabled = false;
}

document.addEventListener('DOMContentLoaded', () => {
  loadUserInfo('user-area');
  loadWatchlist();
});
</script>
</body>
</html>
