{% extends "base.html" %}
{% block title %}投資庫存 — ETF 投資管理系統{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6">

  <!-- 總覽卡片 -->
  <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6" id="summary-cards">
    <div class="card p-4 col-span-2 md:col-span-1">
      <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">台幣總市值</div>
      <div class="text-xl font-bold text-slate-800 dark:text-white" id="s-value">—</div>
      <div class="text-xs text-slate-400" id="s-rate"></div>
    </div>
    <div class="card p-4">
      <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">持倉成本</div>
      <div class="text-lg font-bold text-slate-800 dark:text-white" id="s-cost">—</div>
    </div>
    <div class="card p-4">
      <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">未實現損益</div>
      <div class="text-lg font-bold" id="s-profit">—</div>
    </div>
    <div class="card p-4">
      <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">已實現損益</div>
      <div class="text-lg font-bold" id="s-realized">—</div>
    </div>
    <div class="card p-4">
      <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">報酬率</div>
      <div class="text-lg font-bold" id="s-return">—</div>
    </div>
  </div>

  <!-- 配置圓餅圖（持倉 ≥ 2 時顯示） -->
  <div id="alloc-section" class="hidden card p-5 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-bold text-slate-800 dark:text-white flex items-center gap-2">
        <i class="fas fa-chart-pie text-indigo-500 text-sm"></i>資產配置
      </h2>
      <span class="text-xs text-slate-400">按台幣市值</span>
    </div>
    <div class="flex flex-col md:flex-row gap-6 items-center">
      <div class="relative w-44 h-44 flex-shrink-0 mx-auto md:mx-0">
        <canvas id="alloc-chart"></canvas>
      </div>
      <div id="alloc-legend" class="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm"></div>
    </div>
  </div>

  <!-- 操作列 -->
  <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
    <h2 class="font-bold text-slate-800 dark:text-white">持倉明細</h2>
    <div class="flex gap-2 flex-wrap">
      <button onclick="openTradeModal('','buy')" class="btn-primary text-sm">
        <i class="fas fa-plus"></i><span class="hide-mobile"> 新增成交</span>
      </button>
    </div>
  </div>

  <!-- 持倉表格 -->
  <div class="card overflow-hidden mb-6" id="portfolio-card">
    <div class="flex items-center justify-center py-12 text-slate-400"><span class="spinner mr-2"></span>載入中…</div>
  </div>

  <!-- 交易紀錄 -->
  <div class="flex items-center justify-between mb-3">
    <h2 class="font-bold text-slate-800 dark:text-white">交易紀錄</h2>
    <select id="filter-ticker" onchange="loadTransactions(this.value)" class="input text-xs w-auto px-3 py-1.5">
      <option value="">全部</option>
    </select>
  </div>
  <div class="card overflow-hidden" id="tx-card">
    <div class="flex items-center justify-center py-10 text-slate-400"><span class="spinner mr-2"></span></div>
  </div>
</div>

<!-- ── 成交彈窗 ── -->
<div id="trade-modal" class="hidden fixed inset-0 bg-black/50 dark:bg-black/70 z-50 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm p-6 animate-fade-in">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-slate-800 dark:text-white" id="modal-title">新增成交</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-slate-500 mb-1 block">ETF 代碼</label>
        <input type="text" id="m-ticker" placeholder="如 0050" class="input text-sm" style="text-transform:uppercase">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">類型</label>
          <select id="m-type" class="input text-sm">
            <option value="buy">買入</option>
            <option value="sell">賣出</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">日期</label>
          <input type="date" id="m-date" class="input text-sm">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">股數</label>
          <input type="number" id="m-shares" placeholder="0.0000" step="0.0001" class="input text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">成交價</label>
          <input type="number" id="m-price" placeholder="0.00" step="0.01" class="input text-sm">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500 mb-1 block">手續費</label>
          <input type="number" id="m-comm" value="0" step="1" class="input text-sm">
        </div>
        <div>
          <label class="text-xs text-slate-500 mb-1 block">備註</label>
          <input type="text" id="m-note" placeholder="選填" class="input text-sm">
        </div>
      </div>
      <div id="m-holdings" class="hidden text-xs text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 rounded-lg px-3 py-2"></div>
      <div id="m-total" class="text-xs text-slate-500 bg-slate-50 dark:bg-slate-900 rounded-lg p-2 hidden"></div>
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="closeModal()" class="flex-1 py-2 rounded-lg border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-sm hover:bg-slate-50 dark:hover:bg-slate-700">取消</button>
      <button onclick="submitTrade()" class="flex-1 btn-primary justify-center text-sm"><i class="fas fa-check"></i> 確認</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ── 配置圓餅圖 ───────────────────────────────────────────────────
let _allocChart = null;
let _portfolioRows = [];  // 供 openTradeModal 查詢持股數
const _PALETTE = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316'];

function _renderAllocChart(rows) {
  const section = document.getElementById('alloc-section');
  if (!section || rows.length < 2) { section?.classList.add('hidden'); return; }
  section.classList.remove('hidden');

  const sorted = [...rows].sort((a, b) => (b.value_twd || 0) - (a.value_twd || 0));
  const totalTwd = sorted.reduce((s, r) => s + (r.value_twd || 0), 0);

  const labels  = sorted.map(r => r.ticker);
  const values  = sorted.map(r => r.value_twd || 0);
  const colors  = labels.map((_, i) => _PALETTE[i % _PALETTE.length]);
  const profits = sorted.map(r => parseFloat(r.return_pct || 0));

  const ctx = document.getElementById('alloc-chart');
  if (!ctx) return;
  if (_allocChart) { _allocChart.destroy(); _allocChart = null; }

  _allocChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, hoverOffset: 8,
      borderColor: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff' }] },
    options: {
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = totalTwd > 0 ? (ctx.raw / totalTwd * 100).toFixed(1) : '0';
              return ` NT$ ${parseInt(ctx.raw).toLocaleString()} (${pct}%)`;
            }
          }
        }
      }
    }
  });

  // 圖例
  const legend = document.getElementById('alloc-legend');
  if (legend) {
    legend.innerHTML = sorted.map((r, i) => {
      const pct   = totalTwd > 0 ? (r.value_twd / totalTwd * 100).toFixed(1) : '0';
      const retPct = profits[i];
      const retCls  = retPct >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500';
      return `
        <div class="flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer" onclick="location.href='/etf-detail/${r.ticker}'">
          <span class="w-3 h-3 rounded-sm flex-shrink-0" style="background:${colors[i]}"></span>
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between gap-1">
              <span class="font-bold text-xs text-slate-800 dark:text-white">${r.ticker}</span>
              <span class="text-[11px] tabular-nums ${retCls}">${retPct >= 0 ? '+' : ''}${retPct.toFixed(1)}%</span>
            </div>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] text-slate-400">${pct}%</span>
              <div class="flex-1 h-1 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:${pct}%;background:${colors[i]}"></div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }
}

async function checkLogin() {
  if (!Auth.isLoggedIn()) { window.location.href = '/auth'; return false; }
  return true;
}

async function loadPortfolio() {
  if (!await checkLogin()) return;
  const data = await Auth.fetchJson('/api/portfolio');
  if (!data) return;
  const s = data.summary || {};
  const usdRate = s.usd_twd_rate || 32;
  document.getElementById('s-value').textContent = `NT$ ${parseInt(s.total_value_twd || 0).toLocaleString()}`;
  document.getElementById('s-rate').textContent = `USD/TWD: ${usdRate}`;
  const pf = parseFloat(s.total_profit_twd || 0);
  const rt = parseFloat(s.total_return || 0);
  const rl = parseFloat(s.total_realized_twd || 0);
  document.getElementById('s-cost').textContent = `NT$ ${parseInt(s.total_cost_twd || 0).toLocaleString()}`;
  document.getElementById('s-profit').textContent = (pf >= 0 ? '+' : '') + `NT$ ${parseInt(pf).toLocaleString()}`;
  document.getElementById('s-profit').className = `text-lg font-bold ${pf >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`;
  document.getElementById('s-realized').textContent = (rl >= 0 ? '+' : '') + `NT$ ${parseInt(rl).toLocaleString()}`;
  document.getElementById('s-realized').className = `text-lg font-bold ${rl >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`;
  document.getElementById('s-return').textContent = fmtPct(rt);
  document.getElementById('s-return').className = `text-lg font-bold ${rt >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`;

  const rows = data.data || [];
  _portfolioRows = rows;
  if (!rows.length) {
    document.getElementById('portfolio-card').innerHTML = `<div class="text-center py-12 text-slate-400"><i class="fas fa-wallet text-3xl mb-3"></i><br>尚無持倉，<button onclick="openTradeModal('','buy')" class="text-indigo-500 hover:underline">新增第一筆</button></div>`;
    document.getElementById('alloc-section').classList.add('hidden');
    return;
  }

  // ── 資產配置圓餅圖 ────────────────────────────────────
  _renderAllocChart(rows);
  const tickers = [...new Set(rows.map(r => r.ticker))];
  const sel = document.getElementById('filter-ticker');
  sel.innerHTML = '<option value="">全部</option>' + tickers.map(t => `<option>${t}</option>`).join('');
  document.getElementById('portfolio-card').innerHTML = `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-slate-100 dark:border-slate-700 text-xs text-slate-500 dark:text-slate-400">
          <th class="text-left px-4 py-3">代碼</th>
          <th class="text-right px-4 py-3 hide-mobile">持股數</th>
          <th class="text-right px-4 py-3">均價</th>
          <th class="text-right px-4 py-3">現價</th>
          <th class="text-right px-4 py-3">損益</th>
          <th class="text-right px-4 py-3 hide-mobile">報酬率</th>
          <th class="text-right px-4 py-3 hide-mobile">台幣市值</th>
          <th class="px-4 py-3"></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => {
            const pf = parseFloat(r.profit || 0);
            const rt = parseFloat(r.return_pct || 0);
            return `<tr class="table-row border-b border-slate-50 dark:border-slate-800" onclick="location.href='/etf-detail/${r.ticker}'">
              <td class="px-4 py-3">
                <div class="font-bold text-slate-800 dark:text-white">${r.ticker}</div>
                <div class="text-xs text-slate-400 truncate max-w-[100px]">${r.name || ''}</div>
                ${r.market === 'US' ? '<span class="badge badge-blue text-xs">US</span>' : '<span class="badge badge-purple text-xs">TW</span>'}
              </td>
              <td class="px-4 py-3 text-right font-mono text-xs hide-mobile">${fmt(r.shares, 4)}</td>
              <td class="px-4 py-3 text-right font-mono">${fmt(r.avg_cost)}</td>
              <td class="px-4 py-3 text-right font-mono font-semibold">${fmt(r.current_price)}</td>
              <td class="px-4 py-3 text-right font-mono ${pf >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}">${pf >= 0 ? '+' : ''}${parseInt(pf).toLocaleString()}</td>
              <td class="px-4 py-3 text-right hide-mobile ${rt >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}">${fmtPct(rt)}</td>
              <td class="px-4 py-3 text-right hide-mobile font-mono text-xs">NT$ ${parseInt(r.value_twd || 0).toLocaleString()}</td>
              <td class="px-4 py-3" onclick="event.stopPropagation()">
                <button onclick="openTradeModal('${r.ticker}','sell')" class="text-xs text-red-400 hover:text-red-600 mr-2"><i class="fas fa-minus-circle"></i></button>
                <button onclick="openTradeModal('${r.ticker}','buy')" class="text-xs text-green-500 hover:text-green-700"><i class="fas fa-plus-circle"></i></button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function loadTransactions(ticker = '') {
  if (!Auth.isLoggedIn()) return;
  const url = ticker ? `/api/portfolio/transactions?ticker=${ticker}` : '/api/portfolio/transactions';
  const data = await Auth.fetchJson(url);
  const rows = data?.data || [];
  if (!rows.length) {
    document.getElementById('tx-card').innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">無交易紀錄</div>';
    return;
  }
  const typeMap = { buy: ['買入','badge-green'], sell: ['賣出','badge-red'] };
  document.getElementById('tx-card').innerHTML = `
    <div class="overflow-x-auto">
      <table class="w-full text-xs">
        <thead><tr class="border-b border-slate-100 dark:border-slate-700 text-slate-500 dark:text-slate-400">
          <th class="text-left px-3 py-2">日期</th>
          <th class="text-left px-3 py-2">代碼</th>
          <th class="text-left px-3 py-2">類型</th>
          <th class="text-right px-3 py-2">股數</th>
          <th class="text-right px-3 py-2">價格</th>
          <th class="text-right px-3 py-2 hide-mobile">金額</th>
          <th class="text-right px-3 py-2 hide-mobile">備註</th>
          <th class="px-3 py-2"></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => {
            const [tLabel, tBadge] = typeMap[r.transaction_type] || [r.transaction_type,'badge-blue'];
            const amt = parseFloat(r.shares) * parseFloat(r.price);
            return `<tr class="table-row border-b border-slate-50 dark:border-slate-800">
              <td class="px-3 py-2 text-slate-500">${r.transaction_date || ''}</td>
              <td class="px-3 py-2 font-bold text-slate-800 dark:text-slate-200">${r.ticker}</td>
              <td class="px-3 py-2"><span class="badge ${tBadge}">${tLabel}</span></td>
              <td class="px-3 py-2 text-right font-mono">${fmt(r.shares, 4)}</td>
              <td class="px-3 py-2 text-right font-mono">${fmt(r.price)}</td>
              <td class="px-3 py-2 text-right font-mono hide-mobile">${parseInt(amt).toLocaleString()}</td>
              <td class="px-3 py-2 text-slate-400 hide-mobile max-w-[80px] truncate">${r.note || ''}</td>
              <td class="px-3 py-2"><button onclick="deleteTx(${r.id})" class="text-red-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function deleteTx(id) {
  if (!confirm('確定刪除此筆交易？')) return;
  const data = await Auth.fetchJson(`/api/portfolio/transaction/${id}`, { method: 'DELETE' });
  if (data?.status === 'success') {
    showToast('已刪除');
    loadPortfolio();
    // 保留目前篩選的 ticker，避免刪除後 filter 跳回「全部」
    const currentTicker = document.getElementById('filter-ticker').value;
    loadTransactions(currentTicker);
  } else showToast(data?.message || '刪除失敗', false);
}

function openTradeModal(ticker, type) {
  document.getElementById('m-ticker').value = ticker || '';
  document.getElementById('m-type').value = type || 'buy';
  const _d = new Date();
  document.getElementById('m-date').value = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
  document.getElementById('m-shares').value = '';
  document.getElementById('m-price').value = '';
  document.getElementById('m-comm').value = '0';
  document.getElementById('m-note').value = '';
  document.getElementById('m-total').classList.add('hidden');
  document.getElementById('modal-title').textContent = type === 'sell' ? '賣出' : '買入';
  // 賣出時顯示目前持股數量，方便使用者確認上限
  const holdingsEl = document.getElementById('m-holdings');
  if (type === 'sell' && ticker) {
    const held = _portfolioRows.find(r => r.ticker === ticker);
    if (held) {
      holdingsEl.textContent = `目前持有 ${parseFloat(held.shares).toFixed(4)} 股（均價 ${parseFloat(held.avg_cost).toFixed(2)}）`;
      holdingsEl.classList.remove('hidden');
    } else holdingsEl.classList.add('hidden');
  } else holdingsEl.classList.add('hidden');
  // 每次開彈窗產生新 UUID，確保同一筆交易的重複送出被 DB 層攔截
  _idemKey = (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Date.now().toString(36) + Math.random().toString(36).slice(2);
  document.getElementById('trade-modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('trade-modal').classList.add('hidden');
  _submitting = false;   // 關閉彈窗時重置送出鎖，確保下次開啟時狀態乾淨
  const btn = document.querySelector('#trade-modal button[onclick="submitTrade()"]');
  if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> 確認'; }
}

function updateTotal() {
  const s = parseFloat(document.getElementById('m-shares').value) || 0;
  const p = parseFloat(document.getElementById('m-price').value) || 0;
  const c = parseFloat(document.getElementById('m-comm').value) || 0;
  const box = document.getElementById('m-total');
  if (s > 0 && p > 0) {
    const subtotal = s * p;
    const total    = subtotal + c;
    box.textContent = c > 0
      ? `成交金額：${parseInt(subtotal).toLocaleString()} + 手續費 ${parseInt(c).toLocaleString()} = NT$ ${parseInt(total).toLocaleString()}`
      : `成交金額：NT$ ${parseInt(subtotal).toLocaleString()}`;
    box.classList.remove('hidden');
  } else box.classList.add('hidden');
}

let _submitting = false;   // 前端送出鎖，防止多次點擊
let _idemKey    = '';      // 每次開彈窗重新產生的冪等鍵

async function submitTrade() {
  if (_submitting) return;   // 已在處理中，直接忽略

  const body = {
    ticker: document.getElementById('m-ticker').value.trim().toUpperCase(),
    transaction_type: document.getElementById('m-type').value,
    shares: parseFloat(document.getElementById('m-shares').value),
    price: parseFloat(document.getElementById('m-price').value),
    commission: parseFloat(document.getElementById('m-comm').value) || 0,
    transaction_date: document.getElementById('m-date').value,
    note: document.getElementById('m-note').value,
    idempotency_key: _idemKey,  // 每次開彈窗產生一次，重複點擊送相同 key → DB 拒絕
  };
  if (!body.ticker || !body.shares || !body.price || !body.transaction_date) return showToast('請填寫必要欄位', false);
  const _now = new Date();
  const _todayLocal = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
  if (body.transaction_date > _todayLocal) return showToast('交易日期不能是未來日期', false);
  if (body.shares <= 0 || body.price <= 0) return showToast('股數與價格必須大於 0', false);

  // 鎖定按鈕，防止雙擊重複送出
  const btn = document.querySelector('#trade-modal button[onclick="submitTrade()"]');
  _submitting = true;
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner mr-1"></span> 處理中…'; }

  try {
    const data = await Auth.fetchJson('/api/portfolio/transaction', { method:'POST', body: JSON.stringify(body) });
    if (data?.status === 'success') {
      showToast('已新增');
      closeModal();
      loadPortfolio();
      loadTransactions();
    } else {
      showToast(data?.message || '新增失敗', false);
    }
  } finally {
    // 不管成功或失敗，恢復按鈕（業務錯誤讓使用者更正後重送）
    _submitting = false;
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> 確認'; }
  }
}

document.getElementById('m-shares').addEventListener('input', updateTotal);
document.getElementById('m-price').addEventListener('input', updateTotal);
document.getElementById('trade-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

Promise.all([loadPortfolio(), loadTransactions()]);
</script>
