<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庫存 - ETF 投資管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *{font-family:'Inter',sans-serif;}
        .row-hover:hover{background:#f8fafc;}
        @keyframes fadeInOut{0%,100%{opacity:0;transform:translateX(-50%) translateY(8px)}15%,85%{opacity:1;transform:translateX(-50%) translateY(0)}}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;animation:fadeInOut 3s ease;font-size:.875rem;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner{display:inline-block;width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;}
    </style>
</head>

        <div class="flex items-center gap-3">

</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
    <!-- 頁首 -->
    <div class="flex items-center justify-between mb-5">

            <h1 class="text-xl font-bold text-slate-800">投資庫存</h1>

    <!-- 交易明細 -->

                        <th class="px-4 py-3 text-right">股數</th>

                        <th class="px-4 py-3 text-right hidden md:table-cell">總額</th>

<!-- 手機底部 -->

    <div class="flex justify-around py-2">
        <a href="/etf-list"  class="flex flex-col items-center gap-0.5 text-slate-400"><i class="fas fa-list text-lg"></i><span class="text-[10px]">精選</span></a>
        <a href="/watchlist" class="flex flex-col items-center gap-0.5 text-slate-400"><i class="fas fa-heart text-lg"></i><span class="text-[10px]">自選</span></a>

        <a href="/backtest"  class="flex flex-col items-center gap-0.5 text-slate-400"><i class="fas fa-history text-lg"></i><span class="text-[10px]">回測</span></a>
        <a href="/profile"   class="flex flex-col items-center gap-0.5 text-slate-400"><i class="fas fa-user text-lg"></i><span class="text-[10px]">會員</span></a>

<!-- 交易 Modal -->
<div id="addModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden justify-center items-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 w-96 max-h-[90vh] overflow-y-auto">
        <h3 id="modalTitle" class="text-lg font-semibold text-gray-900 mb-4">新增交易紀錄</h3>
        
        <form id="transactionForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">市場類型</label>
                <div class="flex gap-4">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="market_type" value="TW" checked class="form-radio text-blue-600" onchange="calculateDynamicResult()">
                        <span class="ml-2 text-sm text-gray-700">台股 (TWD)</span>
                    </label>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="radio" name="market_type" value="US" class="form-radio text-blue-600" onchange="calculateDynamicResult()">
                        <span class="ml-2 text-sm text-gray-700">美股 (USD)</span>
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">標的代碼</label>
                    <input type="text" id="modalTicker" required class="w-full border rounded p-2 text-sm" placeholder="e.g. 0050, AAPL" oninput="checkStockAndCalculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">交易類型</label>
                    <select id="modalType" class="w-full border rounded p-2 text-sm" onchange="checkStockAndCalculate()">
                        <option value="buy">買入</option>
                        <option value="sell">賣出</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">股數</label>
                    <input type="number" id="modalShares" step="any" required class="w-full border rounded p-2 text-sm" oninput="checkStockAndCalculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">成交價格</label>
                    <input type="number" id="modalPrice" step="any" required class="w-full border rounded p-2 text-sm" oninput="checkStockAndCalculate()">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-gray-700">手續費</label>
                    <label class="inline-flex items-center text-xs text-gray-500 cursor-pointer">
                        <input type="checkbox" id="autoCommission" checked class="rounded text-blue-600 mr-1" onchange="toggleCommissionInput()">
                        自動計算費率
                    </label>
                </div>
                <input type="number" id="modalCommission" step="any" class="w-full border rounded p-2 text-sm bg-gray-50" readonly value="0" oninput="calculateDynamicResult()">
            </div>

            <div id="stockWarning" class="hidden text-xs text-red-600 bg-red-50 p-2 rounded border border-red-200">
                <i class="fas fa-exclamation-triangle mr-1"></i> <span id="warningMessage">庫存不足！</span>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">交易日期</label>
                <input type="date" id="modalDate" required class="w-full border rounded p-2 text-sm">
            </div>

            <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 space-y-1">
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wider">動態試算結果</div>
                <div class="flex justify-between text-xs text-gray-600">
                    <span>券商原始總價:</span>
                    <span id="calcRawTotal">$0</span>
                </div>
                <div class="flex justify-between text-xs text-gray-600">
                    <span>交易稅/手續費:</span>
                    <span id="calcCommission">$0</span>
                </div>
                <div class="border-t my-1"></div>
                <div class="flex justify-between items-center text-sm">
                    <span class="font-medium text-gray-800">預估交割總金額:</span>
                    <span id="calcFinalTotal" class="font-bold text-blue-600 text-base">$0</span>
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button type="button" onclick="closeAddModal()" class="px-4 py-2 border rounded text-sm text-gray-600 hover:bg-gray-50">取消</button>
                <button type="submit" id="submitBtn" class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">確認送出</button>
            </div>
        </form> 
        </div>
</div>

<!-- 刪除確認 Modal -->
<div id="deleteModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4" style="display:none">
    <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-xl text-center">
        <i class="fas fa-exclamation-triangle text-3xl text-red-400 mb-3 block"></i>
        <p class="font-bold text-slate-800 mb-1">確認刪除？</p>
        <p class="text-sm text-slate-400 mb-5">此操作無法復原</p>
        <div class="flex gap-2">
            <button onclick="confirmDelete()" class="flex-1 bg-red-500 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-red-600">刪除</button>
            <button onclick="closeDeleteModal()" class="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-200">取消</button>
        </div>
    </div>
</div>

<script>
let currentFilter='all', currentUser=null, portfolioData=[], transactionsData=[], deleteId=null;

// 1. 這是原本完整、閉合正確的儲存交易函數
async function saveTransaction(e) {
    e.preventDefault();
    if(!currentUser) return;
    
    const ticker = document.getElementById('modalTicker').value.trim().upper();
    const type = document.getElementById('modalType').value;
    const shares = document.getElementById('modalShares').value;
    const price = document.getElementById('modalPrice').value;
    const commission = document.getElementById('modalCommission').value;
    const date = document.getElementById('modalDate').value;
    
    if(!ticker || !shares || !price || !date) {
        toast('請填寫完整欄位', false);
        return;
    }
    
    const url = editId ? `/api/portfolio/transaction/${editId}` : '/api/portfolio/transaction';
    const method = editId ? 'PUT' : 'POST';
    
    try {
        const res = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-User-Id': currentUser.id
            },
            body: json.stringify({
                ticker: ticker,
                transaction_type: type,
                shares: shares,
                price: price,
                commission: commission,
                transaction_date: date
            })
        });
        const d = await res.json();
        if(d.status === 'success') {
            toast(editId ? '已更新' : '已新增', true);
            closeAddModal();
            await loadData();
        } else {
            toast(d.message || '操作失敗', false);
        }
    } catch {
        toast('網路錯誤', false);
    }
} // ⬅️ 確保原本的函數在這裡確實關閉了！

// 2. 把這三個進階功能函數「獨立擺在外面」，不要塞在別人的函數身體裡
function toggleCommissionInput() {
    const autoCheck = document.getElementById('autoCommission').checked;
    const commInput = document.getElementById('modalCommission');
    if (autoCheck) {
        commInput.readOnly = true;
        commInput.classList.add('bg-gray-50');
    } else {
        commInput.readOnly = false;
        commInput.classList.remove('bg-gray-50');
    }
    calculateDynamicResult();
}

function checkStockAndCalculate() {
    const ticker = document.getElementById('modalTicker').value.trim().toUpperCase();
    const type = document.getElementById('modalType').value;
    const sharesInput = parseFloat(document.getElementById('modalShares').value) || 0;
    
    const warningDiv = document.getElementById('stockWarning');
    const warningMsg = document.getElementById('warningMessage');
    const submitBtn = document.getElementById('submitBtn');
    
    if (warningDiv) warningDiv.classList.add('hidden');
    if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    // 🛡️ 使用你網頁中正確的全域變流名稱 holdingsData
    if (type === 'sell' && ticker && typeof holdingsData !== 'undefined') {
        const stockItem = holdingsData.find(item => item.ticker.toUpperCase() === ticker);
        const currentShares = stockItem ? parseFloat(stockItem.shares) : 0;

        if (sharesInput > currentShares) {
            if (warningMsg) warningMsg.innerText = `庫存不足！你目前持有 ${ticker} 共 ${currentShares} 股，無法賣出 ${sharesInput} 股。`;
            if (warningDiv) warningDiv.classList.remove('hidden');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }
    }
    calculateDynamicResult();
}

function calculateDynamicResult() {
    const marketEl = document.querySelector('input[name="market_type"]:checked');
    if (!marketEl) return;
    
    const market = marketEl.value;
    const type = document.getElementById('modalType').value;
    const shares = parseFloat(document.getElementById('modalShares').value) || 0;
    const price = parseFloat(document.getElementById('modalPrice').value) || 0;
    const autoCheck = document.getElementById('autoCommission').checked;
    const commInput = document.getElementById('modalCommission');

    const rawTotal = shares * price;
    let commission = 0;

    if (autoCheck) {
        if (rawTotal > 0) {
            if (market === 'TW') {
                let twFee = Math.round(rawTotal * 0.001425 * 0.6);
                commission = Math.max(20, twFee);
                if (type === 'sell') {
                    commission += Math.floor(rawTotal * 0.003);
                }
            } else {
                commission = 0;
            }
        }
        if (commInput) commInput.value = commission;
    } else {
        commission = parseFloat(commInput.value) || 0;
    }

    const finalTotal = (type === 'buy') ? (rawTotal + commission) : (rawTotal - commission);
    const sign = (market === 'TW') ? 'NT$ ' : '$ ';

    const calcRawTotalEl = document.getElementById('calcRawTotal');
    const calcCommissionEl = document.getElementById('calcCommission');
    const calcFinalTotalEl = document.getElementById('calcFinalTotal');

    if (calcRawTotalEl) calcRawTotalEl.innerText = sign + Math.round(rawTotal).toLocaleString();
    if (calcCommissionEl) calcCommissionEl.innerText = sign + Math.round(commission).toLocaleString();
    if (calcFinalTotalEl) calcFinalTotalEl.innerText = sign + Math.round(finalTotal).toLocaleString();
}

function toast(msg,ok=true){
    const el=document.createElement('div');el.className='toast';
    el.style.background=ok?'#10b981':'#ef4444';
    el.innerHTML=`<i class="fas ${ok?'fa-check':'fa-times-circle'} mr-2"></i>${msg}`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}

function checkLogin(){
    const u=localStorage.getItem('user');
    if(u){
        try{
            currentUser=JSON.parse(u);
            document.getElementById('user-info').innerHTML=`
                <div class="flex items-center gap-2">
                    <span class="text-sm text-slate-600 hidden md:inline">${currentUser.username}</span>
                    <button onclick="logout()" class="text-slate-400 hover:text-slate-700 px-2 py-1 rounded hover:bg-slate-100 text-sm"><i class="fas fa-sign-out-alt"></i></button>
                </div>`;
            loadData();
        }catch(e){localStorage.removeItem('user');showLoginPrompt();}
    } else {showLoginPrompt();}
}
function logout(){localStorage.removeItem('user');localStorage.removeItem('token');location.reload();}
function showLoginPrompt(){
    document.getElementById('login-prompt').classList.remove('hidden');
    document.getElementById('summary-cards').classList.add('hidden');
    document.getElementById('portfolio-table-body').innerHTML=`<tr><td colspan="8" class="px-4 py-14 text-center text-slate-400 text-sm"><i class="fas fa-lock block mb-2 text-2xl"></i>請先登入</td></tr>`;
}

async function loadData(){
    if(!currentUser)return;
    try{
        const [pr, tr] = await Promise.all([
            fetch('/api/portfolio',{headers:{'X-User-Id':currentUser.id}}).then(r=>r.json()),
            fetch('/api/portfolio/transactions',{headers:{'X-User-Id':currentUser.id}}).then(r=>r.json())
        ]);
        if(pr.status==='success'){
            portfolioData=pr.data||[];
            if(pr.summary){
                const s=pr.summary;
                document.getElementById('total-assets').textContent=`$ ${Math.round(s.total_value).toLocaleString()}`;
                const profitUp=s.total_profit>=0;
                document.getElementById('total-profit').textContent=`${profitUp?'+':'-'} $ ${Math.abs(Math.round(s.total_profit)).toLocaleString()}`;
                document.getElementById('total-profit').className=`text-xl font-bold tabular-nums ${profitUp?'text-red-500':'text-green-600'}`;
                document.getElementById('total-return').textContent=`報酬率 ${profitUp?'+':''}${s.total_return.toFixed(1)}%`;
                const estDiv=portfolioData.reduce((acc,item)=>acc+(item.market_value||0)*(item.dividend_yield||0)/100,0);
                document.getElementById('estimated-dividend').textContent=`$ ${Math.round(estDiv).toLocaleString()}`;
                document.getElementById('holding-count').textContent=`${portfolioData.length} 檔`;
            }
        }
        if(tr.status==='success') transactionsData=tr.data||[];
        renderPortfolio();renderTransactions();
        document.getElementById('update-time').textContent=`更新於 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}`;
    }catch(e){toast('載入失敗',false);}
}

function filterMarket(m){
    currentFilter=m;
    const on='px-4 py-1.5 rounded-md text-sm font-semibold bg-white text-slate-800 shadow-sm transition-all';
    const off='px-4 py-1.5 rounded-md text-sm font-semibold text-slate-400 transition-all';
    ['all','tw','us'].forEach(k=>document.getElementById('btn-'+k).className=(k===m.toLowerCase())?on:off);
    renderPortfolio();
}

function renderPortfolio(){
    const tbody=document.getElementById('portfolio-table-body');
    let rows=portfolioData;
    if(currentFilter!=='all') rows=portfolioData.filter(d=>d.market===currentFilter);
    if(!rows.length){
        tbody.innerHTML=`<tr><td colspan="8" class="px-4 py-14 text-center text-slate-400 text-sm">${portfolioData.length?'此市場無庫存':'尚無庫存記錄'}</td></tr>`;
        return;
    }
    tbody.innerHTML=rows.map(item=>{
        const cp=item.current_price||item.avg_cost;
        const mv=item.market_value||(item.shares*cp);
        const cost=item.cost||(item.shares*item.avg_cost);
        const profit=item.profit||(mv-cost);
        const retPct=item.return_pct||(cost>0?profit/cost*100:0);
        const up=profit>=0;
        return `
        <tr class="row-hover border-b border-slate-50 transition-colors">
            <td class="px-4 py-3.5">
                <div class="font-bold text-indigo-600 text-sm">${item.ticker}</div>
                <div class="text-xs text-slate-400">${item.name||''}</div>
            </td>
            <td class="px-4 py-3.5 text-right text-slate-700 tabular-nums">${item.shares.toLocaleString()}</td>
            <td class="px-4 py-3.5 text-right text-slate-600 tabular-nums">${item.avg_cost.toFixed(2)}</td>
            <td class="px-4 py-3.5 text-right font-semibold text-slate-800 tabular-nums">${cp.toFixed(2)}</td>
            <td class="px-4 py-3.5 text-right font-semibold text-slate-800 tabular-nums">${Math.round(mv).toLocaleString()}</td>
            <td class="px-4 py-3.5 text-right font-semibold tabular-nums ${up?'text-red-500':'text-green-600'}">${up?'+':''}${Math.round(profit).toLocaleString()}</td>
            <td class="px-4 py-3.5 text-right font-semibold tabular-nums hidden md:table-cell ${up?'text-red-500':'text-green-600'}">${up?'+':''}${retPct.toFixed(1)}%</td>
            <td class="px-4 py-3.5 text-center">
                <button onclick="openTradeModal('${item.ticker}','buy')" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-2 py-1 rounded mr-1">買</button>
                <button onclick="openTradeModal('${item.ticker}','sell')" class="text-xs bg-orange-50 text-orange-600 hover:bg-orange-100 px-2 py-1 rounded">賣</button>
            </td>
        </tr>`;
    }).join('');
}

function renderTransactions(){
    const tbody=document.getElementById('transaction-table-body');
    if(!transactionsData.length){
        tbody.innerHTML=`<tr><td colspan="7" class="px-4 py-10 text-center text-slate-400 text-sm">尚無交易記錄</td></tr>`;
        return;
    }
    tbody.innerHTML=transactionsData.map(t=>{
        const up=t.transaction_type==='buy';
        const total=t.shares*t.price+t.commission;
        return `
        <tr class="row-hover border-b border-slate-50 transition-colors">
            <td class="px-4 py-2.5 text-xs text-slate-500">${t.transaction_date||''}</td>
            <td class="px-4 py-2.5 font-medium text-indigo-600 text-sm">${t.ticker}</td>
            <td class="px-4 py-2.5">
                <span class="text-xs px-1.5 py-0.5 rounded font-medium ${up?'bg-red-50 text-red-500':'bg-green-50 text-green-600'}">${up?'買入':'賣出'}</span>
            </td>
            <td class="px-4 py-2.5 text-right text-sm tabular-nums text-slate-700">${t.shares}</td>
            <td class="px-4 py-2.5 text-right text-sm tabular-nums text-slate-700">${t.price.toFixed(2)}</td>
            <td class="px-4 py-2.5 text-right text-sm tabular-nums text-slate-700 hidden md:table-cell">${Math.round(total).toLocaleString()}</td>
            <td class="px-4 py-2.5 text-center">
                <button onclick="openDeleteModal(${t.id})" class="text-slate-300 hover:text-red-400 transition-colors">
                    <i class="fas fa-trash text-xs"></i>
                </button>
            </td>
        </tr>`;
    }).join('');
}

function openTradeModal(ticker,type){
    if(!currentUser){toast('請先登入',false);setTimeout(()=>location.href='/auth',1000);return;}
    document.getElementById('modal-title').textContent=ticker==='new'?'新增成交':`${ticker} — ${type==='buy'?'買入':'賣出'}`;
    document.getElementById('trade-ticker').value=ticker==='new'?'':ticker;
    document.querySelector(`input[name="trade-type"][value="${type}"]`).checked=true;
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('trade-date').value=today;
    document.getElementById('trade-date').max=today;
    if(ticker==='new'){document.getElementById('trade-shares').value='';document.getElementById('trade-price').value='';}
    document.getElementById('trade-commission').value='0';
    document.getElementById('tradeModal').style.display='flex';
    document.getElementById('autoCommission').checked = false;
    toggleCommissionInput(); // 解除輸入框唯讀
    calculateDynamicResult(); // 觸發底部卡片動態試算
}
function closeTradeModal(){document.getElementById('tradeModal').style.display='none';}

async function saveTrade(btn){
    const ticker=document.getElementById('trade-ticker').value.trim().toUpperCase();
    const type=document.querySelector('input[name="trade-type"]:checked').value;
    const date=document.getElementById('trade-date').value;
    const shares=parseInt(document.getElementById('trade-shares').value);
    const price=parseFloat(document.getElementById('trade-price').value);
    const commission=parseFloat(document.getElementById('trade-commission').value)||0;
    if(!ticker||!shares||shares<=0||!price||price<=0){toast('請填寫所有欄位',false);return;}
    if(type==='sell'){
        const h=portfolioData.find(p=>p.ticker===ticker);
        if(!h||h.shares<shares){toast(`持股不足（持有 ${h?.shares||0} 股）`,false);return;}
    }
    const orig=btn.textContent;btn.textContent='處理中…';btn.disabled=true;
    try{
        const res=await fetch('/api/portfolio/transaction',{
            method:'POST',
            headers:{'Content-Type':'application/json','X-User-Id':currentUser.id},
            body:JSON.stringify({ticker,transaction_type:type,shares,price,commission,transaction_date:date})
        });
        const d=await res.json();
        if(d.status==='success'){toast(`${type==='buy'?'買入':'賣出'} ${ticker} 成功`,true);closeTradeModal();await loadData();}
        else toast(d.message||'失敗',false);
    }catch{toast('網路錯誤',false);}
    finally{btn.textContent=orig;btn.disabled=false;}
}

function openDeleteModal(id){deleteId=id;document.getElementById('deleteModal').style.display='flex';}
function closeDeleteModal(){document.getElementById('deleteModal').style.display='none';deleteId=null;}
async function confirmDelete(){
    if(!deleteId||!currentUser)return;
    try{
        const res=await fetch(`/api/portfolio/transaction/${deleteId}`,{method:'DELETE',headers:{'X-User-Id':currentUser.id}});
        const d=await res.json();
        if(d.status==='success'){toast('已刪除',true);closeDeleteModal();await loadData();}
        else toast(d.message||'刪除失敗',false);
    }catch{toast('網路錯誤',false);}
}

function exportTransactions(){
    if(!transactionsData.length){toast('尚無記錄',false);return;}
    let csv='日期,標的,類型,股數,成本,手續費,總額\n';
    transactionsData.forEach(t=>{
        csv+=`${t.transaction_date},${t.ticker},${t.transaction_type==='buy'?'買入':'賣出'},${t.shares},${t.price},${t.commission},${Math.round(t.shares*t.price+t.commission)}\n`;
    });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download=`transactions_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();toast('匯出成功',true);
}

window.onclick=e=>{
    if(e.target===document.getElementById('tradeModal'))closeTradeModal();
    if(e.target===document.getElementById('deleteModal'))closeDeleteModal();
};
document.addEventListener('DOMContentLoaded',checkLogin);
