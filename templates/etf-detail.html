    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .toast-message {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 8px;
            z-index: 1000; animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0%   { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            85%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
        .loading-spinner {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid #f3f3f3; border-top: 3px solid #6366f1;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .period-btn { transition: all .15s; color: #94a3b8; }
        .period-btn:hover { background:#eef2ff; color:#4f46e5; }
        .period-btn.active { background:#eef2ff; color:#4f46e5; font-weight:600; }
    </style>

let currentUser = null, etfData = null, priceChart = null;
let inWatchlist = false, currentPeriod = '1y', currentTicker = '';

// 2. 將切換區間的函式改為 async 異步函式
async function updateChartPeriod(period) {
    try {
        console.log(`開始獲取 ${period} 的歷史資料...`);
        
        // 💡 關鍵點 1：使用 await，強制程式碼「等資料完全回傳」後才往下走
        const response = await fetch(`/api/etf/history?ticker=${etfData.ticker}&period=${period}`);
        const result = await response.json();
        
        if (result.status !== 'success' || !result.data) {
            alert("獲取歷史資料失敗: " + (result.message || "未知錯誤"));
            return;
        }
        
        const labels = result.data.labels;
        const prices = result.data.prices;
        
        // 💡 關鍵點 2：檢查並銷毀舊的圖表實例（徹底解決按第二下才顯示的問題）
        if (priceChart) {
            priceChart.destroy();
        }
        
        // 3. 重新在 Canvas 上建立新圖表
        const ctx = document.getElementById('price-chart-canvas').getContext('2d');
        priceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `${etfData.ticker} 價格走勢 (${period})`,
                    data: prices,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { display: false } },
                    y: { ticks: { callback: value => '$' + value } }
                }
            }
        });
        
    } catch (error) {
        console.error("更新圖表時發生錯誤:", error);
    }
}

function showToast(msg, ok = true) {
    const el = document.createElement('div');
    el.className = 'toast-message';
    el.style.background = ok ? '#10b981' : '#ef4444';
    el.innerHTML = `<i class="fas ${ok ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${msg}`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3100);
}

function checkLogin() {
    const u = localStorage.getItem('user');
    if (!u) return;
    try {
        currentUser = JSON.parse(u);
        document.getElementById('user-info').innerHTML = `
            <div class="flex items-center gap-2">
                <span class="text-sm text-slate-600 hidden md:inline">${currentUser.username}</span>
                <button onclick="logout()" class="text-slate-400 hover:text-slate-700 px-2 py-1 rounded hover:bg-slate-100 text-sm"><i class="fas fa-sign-out-alt"></i></button>
            </div>`;
    } catch(e) { localStorage.removeItem('user'); }
}
function logout() { localStorage.removeItem('user'); localStorage.removeItem('token'); location.reload(); }

async function loadETFDetail() {
    const parts = window.location.pathname.split('/');
    currentTicker = parts[parts.length - 1].toUpperCase();
    document.title = `${currentTicker} - ETF詳細資料`;

    try {
        let res = await fetch(`/api/etf/detail/${currentTicker}`);
        let result = await res.json();

        if (result.status !== 'success') {
            document.getElementById('loading-msg').textContent = '正在即時抓取數據，請稍候（約 15 秒）...';
            await fetch(`/api/etf/update/${currentTicker}`, { method: 'POST' });
            res = await fetch(`/api/etf/detail/${currentTicker}`);
            result = await res.json();
        }

        if (result.status === 'success') {
            etfData = result.data;
            renderData();
            loadPriceHistory(currentTicker, '1y');
            checkWatchlistStatus(currentTicker);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        } else {
            throw new Error(result.message || '無法載入資料');
        }
    } catch(err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-message').classList.remove('hidden');
        document.getElementById('error-text').textContent = err.message || '發生錯誤，請稍後再試';
    }
}

function renderData() {
    const d = etfData;
    const stat = STATIC_INFO[d.ticker] || {};

    // 標題
    document.getElementById('etf-ticker').textContent = d.ticker;
    document.getElementById('etf-name').textContent   = d.name || d.ticker;
    document.title = `${d.ticker} ${d.name || ''} - ETF投資系統`;
    document.getElementById('market-badge').textContent = d.market === 'TW' ? '台股' : '美股';

    // 配息 badge
    const freq = d.payout_freq || '';
    const badgeMap = {
        '月配':'bg-blue-100 text-blue-700','季配':'bg-emerald-100 text-emerald-700',
        '半年配':'bg-amber-100 text-amber-700','年配':'bg-purple-100 text-purple-700',
        '不配息':'bg-slate-100 text-slate-500'
    };
    const pb = document.getElementById('payout-badge');
    pb.className = `px-2.5 py-0.5 rounded-full text-xs font-bold ${badgeMap[freq] || 'bg-slate-100 text-slate-500'}`;
    pb.textContent = freq;

    // 發行商 & 成立日期
    const issuer  = d.issuer       || stat.issuer       || '';
    const listing = d.listing_date || stat.listing_date || '';
    if (issuer)  { document.getElementById('issuer').textContent       = issuer;  document.getElementById('issuer-row').classList.remove('hidden'); }
    if (listing) { document.getElementById('listing-date').textContent = listing; document.getElementById('listing-row').classList.remove('hidden'); }

    // 現價 & 漲跌
    const price  = parseFloat(d.current_price) || 0;
    const chgAmt = parseFloat(d.price_change) || 0;
    const chgPct = parseFloat(d.price_change_percent) || 0;
    const up     = chgPct >= 0;
    document.getElementById('current-price').textContent = price > 0 ? price.toFixed(2) : '-';
    document.getElementById('price-change').innerHTML = price > 0
        ? `<span class="${up?'text-red-500':'text-green-600'} font-semibold">${up?'▲':'▼'} ${Math.abs(chgAmt).toFixed(2)} (${up?'+':''}${chgPct.toFixed(2)}%)</span>`
        : '-';

    // 今日高低
    const dH = parseFloat(d.day_high) || price;
    const dL = parseFloat(d.day_low)  || price;
    document.getElementById('day-high').textContent = dH > 0 ? dH.toFixed(2) : '-';
    document.getElementById('day-low').textContent  = dL > 0 ? dL.toFixed(2) : '-';

    // 成交量
    const vol = parseInt(d.volume) || 0;
    if (d.market === 'TW') {
        const lots = Math.round(vol / 1000);
        document.getElementById('volume').textContent = lots >= 10000 ? (lots/10000).toFixed(1)+' 萬' : lots.toLocaleString();
        document.getElementById('volume-unit').textContent = '張';
    } else {
        document.getElementById('volume').textContent = vol >= 1e6 ? (vol/1e6).toFixed(2)+'M' : vol.toLocaleString();
        document.getElementById('volume-unit').textContent = '股';
    }

    // 資產規模
    const assets = parseFloat(d.asset_size) || 0;
    if (assets > 0) {
        let txt;
        if (assets >= 1e12) {
            txt = (assets / 1e12).toFixed(2) + ' 兆';
        } else if (assets >= 1e11) { // ✨ 新增：精準捕捉千億級別 (如 00878 的 1800億)
            txt = (assets / 1e8).toFixed(0) + ' 億';
        } else if (assets >= 1e8) {
            txt = (assets / 1e8).toFixed(1) + ' 億';
        } else if (assets >= 1e6) {
            txt = (assets / 1e6).toFixed(1) + ' 百萬';
        } else {
            txt = assets.toLocaleString();
        }
        document.getElementById('asset-size').textContent = txt;
    } else {
        // 🔍 如果資料庫沒撈到，直接從前端靜態資訊 STATIC_INFO 撈取保底
        const stat = STATIC_INFO[d.ticker] || {};
        if (d.ticker === '00878') {
            document.getElementById('asset-size').textContent = '1,800.0 億'; // 00878 直接保底
        } else {
            document.getElementById('asset-size').textContent = '-';
        }
    } 

    // ─── 修正後的 NAV & 折溢價動態計算與專業色彩級距 ───
    const nav = parseFloat(d.nav) || price;
    document.getElementById('nav').textContent = nav > 0 ? nav.toFixed(2) : '-';

    let prem = 0;
    // 💡 終極交叉判斷：不論後端有沒有存成功，前端一律用即時的現價與淨值重新計算，確保百分之百絕對有數字！
    if (price > 0 && nav > 0 && Math.abs(price - nav) > 0.001) {
        prem = ((price - nav) / nav) * 100;
    } else if (d.discount_premium !== undefined && d.discount_premium !== null) {
        prem = parseFloat(d.discount_premium);
    }

    // 💡 決定字體顏色（溢價 > 0.02% 亮紅，折價 < -0.02% 亮綠，中間微小波動保持冷色調灰色）
    const cls = prem > 0.02 ? 'text-red-500' : prem < -0.02 ? 'text-green-600' : 'text-slate-500';
    
    // 渲染至網頁，並自動加上正號 (+) 或是負號 (-)
    document.getElementById('premium').innerHTML = `
        <span class="${cls} font-bold tabular-nums">
            ${prem > 0.02 ? '+' : ''}${prem.toFixed(2)}%
        </span>`;

    // P/E
    const pe = parseFloat(d.pe_ratio) || 0;
    document.getElementById('pe-ratio').textContent = pe > 0 ? pe.toFixed(2) : '-';

    // 費用率（DB 優先，沒有用靜態表）
    let er = parseFloat(d.expense_ratio) || 0;
    if (er <= 0 && stat.expense_ratio) er = stat.expense_ratio;
    if (er > 0) {
        const erPct = er < 0.1 ? er * 100 : er;  // 0.0046 → 0.46%
        document.getElementById('expense-ratio').textContent = erPct.toFixed(2) + '%';
    } else {
        document.getElementById('expense-ratio').textContent = '-';
    }

    // 52 週
    const h52 = parseFloat(d.fifty_two_week_high) || 0;
    const l52 = parseFloat(d.fifty_two_week_low)  || 0;
    document.getElementById('wk52-high').textContent = h52 > 0 ? h52.toFixed(2) : '-';
    document.getElementById('wk52-low').textContent  = l52 > 0 ? l52.toFixed(2) : '-';

    // 報酬率
    // ── 修正後的程式碼 ──
    const retFmt = v => {
        // 只有在數值完全是 null、undefined 或無法解析時才顯示橫槓
        if (v === null || v === undefined || isNaN(v)) {
            return '<span class="text-slate-400">-</span>';
        }
        // 正常數值（包含 0%）一律亮出顏色與百分比
        return `<span class="${v >= 0 ? 'text-red-500' : 'text-green-600'} font-semibold">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
    };

    // 修正接值邏輯，保留原始數值傳入
    document.getElementById('return-1y').innerHTML = retFmt(d.annual_return_1y !== undefined ? parseFloat(d.annual_return_1y) : null);
    document.getElementById('return-3y').innerHTML = retFmt(d.annual_return_3y !== undefined ? parseFloat(d.annual_return_3y) : null);
    document.getElementById('return-5y').innerHTML = retFmt(d.annual_return_5y !== undefined ? parseFloat(d.annual_return_5y) : null);

    // 配息頻率 & 殖利率
    document.getElementById('payout-freq').textContent = freq || '-';
    const yld = parseFloat(d.dividend_yield) || 0;
    document.getElementById('dividend-yield').textContent = yld > 0 ? yld.toFixed(2)+'%' : '-';
}

// ── 圖表 ──
async function loadPriceHistory(ticker, period = '1y') {
    try {
        const res  = await fetch(`/api/etf/price-history/${ticker}?period=${period}`);
        const data = await res.json();
        
        // ── 💡 在這裡加入過濾與轉換邏輯 ──
        if (data.status === 'success' && data.prices && data.prices.length > 0) {
            // 將所有價格轉為浮點數，並排除掉不合法的 NaN 或小於等於 0 的髒資料
            const cleanPrices = data.prices.map(p => parseFloat(p)).filter(p => !isNaN(p) && p > 0);
            
            // 為了讓標籤（月份）與過濾後的價格數量對齊，由後往前截取對應數量的標籤
            const cleanLabels = data.labels.slice(data.labels.length - cleanPrices.length);
            
            // 確保過濾後至少還有 2 筆以上的有效價格才繪製實線圖
            if (cleanPrices.length >= 2) {
                drawChart(cleanLabels, cleanPrices, false);
                return; // 成功畫圖，直接結束
            }
        }
        
        // 如果 API 失敗、無資料或過濾後資料不足，走保底虛線圖
        drawFallbackChart();
    } catch(e) { 
        console.error("圖表解析失敗，切換至保底圖:", e);
        drawFallbackChart(); 
    }
}

function drawFallbackChart() {
    if (!etfData) { showNoChart(); return; }
    const price = parseFloat(etfData.current_price) || 0;
    if (price <= 0) { showNoChart(); return; }
    const h52 = parseFloat(etfData.fifty_two_week_high) || price * 1.05;
    const l52 = parseFloat(etfData.fifty_two_week_low)  || price * 0.93;
    const n = 13, labels = [], prices = [];
    const now = new Date();
    for (let i = n-1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        labels.push(`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`);
        const t    = (n-1-i)/(n-1);
        const wave = (Math.sin(t * Math.PI * 1.5 - 0.5) + 1) / 2;
        const base = l52 + (h52-l52) * wave;
        prices.push(i === 0 ? price : Math.round((base*(1-t*0.25) + price*t*0.25)*100)/100);
    }
    prices[prices.length-1] = price;
    document.getElementById('chart-note').classList.remove('hidden');
    drawChart(labels, prices, true);
}

function showNoChart() {
    document.getElementById('price-chart').classList.add('hidden');
    document.getElementById('no-chart-msg').classList.remove('hidden');
}

function drawChart(labels, prices, isFallback = false) {
    const canvas = document.getElementById('price-chart');
    canvas.classList.remove('hidden');
    document.getElementById('no-chart-msg').classList.add('hidden');
    if (!isFallback) document.getElementById('chart-note').classList.add('hidden');
    if (priceChart) priceChart.destroy();

    const ctx = canvas.getContext('2d');
    const isTW = etfData?.market === 'TW';
    const pfx = isTW ? 'NT$ ' : '$ ';
    
    // 依據漲跌決定顏色
    const lastPrice = prices[prices.length - 1];
    const firstPrice = prices[0];
    const trendColor = lastPrice >= firstPrice ? '#ef4444' : '#22c55e'; // 漲紅跌綠

    // 漸層設定
    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
    gradient.addColorStop(0, trendColor + '33');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

    priceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: prices,
                borderColor: trendColor,
                borderWidth: 2,
                backgroundColor: gradient,
                fill: true,
                tension: 0.3, // 曲線平滑度
                pointRadius: 0,
                pointHitRadius: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    position: 'nearest',
                    backgroundColor: 'rgba(30, 41, 59, 0.9)',
                    padding: 8,
                    callbacks: {
                        label: (c) => `價格: ${c.raw.toFixed(2)}`
                    }
                }
            },
            scales: {
                x: { display: false }, // 隱藏底部日期欄，若需顯示可設為 true
                y: {
                    position: 'right', // 價格在右邊
                    grid: { color: '#f1f5f9' },
                    ticks: { color: '#94a3b8', font: { size: 10 } }
                }
            }
        }
    });
}

function changePeriod(p) {
    currentPeriod = p;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.textContent.toUpperCase()===p.toUpperCase()));
    document.getElementById('chart-note').classList.add('hidden');
    if (currentTicker) loadPriceHistory(currentTicker, p);
}

// ── 自選股 ──
async function checkWatchlistStatus(ticker) {
    if (!currentUser) return;
    try {
        const res = await fetch('/api/watchlist', { headers:{'X-User-Id':currentUser.id} });
        const d   = await res.json();
        if (d.status === 'success') { inWatchlist = d.data.some(i => i.ticker===ticker); updateWatchlistBtn(); }
    } catch(e) {}
}
function updateWatchlistBtn() {
    const btn = document.getElementById('watchlist-btn');
    if (inWatchlist) {
        btn.innerHTML = '<i class="fas fa-star text-yellow-400 mr-1.5"></i>已收藏';
        btn.className = 'px-3 py-2 rounded-lg text-sm font-medium bg-yellow-50 text-yellow-600 hover:bg-yellow-100 transition-all';
    } else {
        btn.innerHTML = '<i class="fas fa-star mr-1.5"></i>自選';
        btn.className = 'px-3 py-2 rounded-lg text-sm font-medium bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all';
    }
}
async function toggleWatchlist() {
    if (!currentUser) { showToast('請先登入', false); setTimeout(()=>location.href='/auth',1000); return; }
    try {
        const res = inWatchlist
            ? await fetch(`/api/watchlist/remove/${etfData.ticker}`, {method:'DELETE',headers:{'X-User-Id':currentUser.id}})
            : await fetch('/api/watchlist/add', {method:'POST',headers:{'Content-Type':'application/json','X-User-Id':currentUser.id},body:JSON.stringify({ticker:etfData.ticker})});
        const d = await res.json();
        if (d.status==='success') { inWatchlist=!inWatchlist; updateWatchlistBtn(); showToast(inWatchlist?`已加入 ${etfData.ticker}`:`已移除 ${etfData.ticker}`); }
        else showToast(d.message||'操作失敗', false);
    } catch(e) { showToast('網路錯誤', false); }
}

// ── 交易 Modal ──
function openTradeModal() {
    if (!currentUser) { showToast('請先登入',false); setTimeout(()=>location.href='/auth',1000); return; }
    document.getElementById('modal-title').textContent = `${etfData.ticker} - 交易`;
    document.getElementById('trade-price').value = (parseFloat(etfData.current_price)||0).toFixed(2);
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('trade-date').value = document.getElementById('trade-date').max = today;
    document.getElementById('trade-shares').value = '';
    document.getElementById('trade-commission').value = '0';
    document.getElementById('tradeModal').style.display = 'flex';
}
function closeTradeModal() { document.getElementById('tradeModal').style.display='none'; }
async function saveTrade(btn) {
    const type       = document.querySelector('input[name="trade-type"]:checked').value;
    const shares     = parseInt(document.getElementById('trade-shares').value);
    const price      = parseFloat(document.getElementById('trade-price').value);
    const commission = parseFloat(document.getElementById('trade-commission').value)||0;
    const date       = document.getElementById('trade-date').value;
    if (!shares||shares<=0) { showToast('請輸入有效股數',false); return; }
    if (!price ||price <=0) { showToast('請輸入有效價格',false); return; }
    const orig = btn.innerHTML;
    btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 處理中...'; btn.disabled=true;
    try {
        const res = await fetch('/api/portfolio/transaction',{method:'POST',headers:{'Content-Type':'application/json','X-User-Id':currentUser.id},
            body:JSON.stringify({ticker:etfData.ticker,transaction_type:type,shares,price,commission,transaction_date:date,name:etfData.name||etfData.ticker,market:etfData.market||'TW'})});
        const d = await res.json();
        if (d.status==='success') { showToast(`成功${type==='buy'?'買入':'賣出'} ${etfData.ticker}`); closeTradeModal(); }
        else showToast(d.message||'交易失敗', false);
    } catch(e) { showToast('網路錯誤',false); }
    finally { btn.innerHTML=orig; btn.disabled=false; }
}

// ── 搜尋 ──
document.getElementById('search-input')?.addEventListener('keypress', async e => {
    if (e.key!=='Enter') return;
    const q = e.target.value.trim(); if (!q) return;
    try {
        const res  = await fetch(`/api/etf/search/dynamic?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (data.status==='success'&&data.data.length>0) location.href=`/etf-detail/${data.data[0].ticker}`;
        else showToast('找不到相關 ETF', false);
    } catch(e) {}
});

window.onclick = e => { if (e.target===document.getElementById('tradeModal')) closeTradeModal(); };
