{% extends "base.html" %}
{% block title %}ETF 精選 — ETF 投資管理系統{% endblock %}

{% block extra_head %}
<style>
  .rank-1 { background:linear-gradient(135deg,#FFD700,#FDB931); color:#1a1a1a; }
  .rank-2 { background:linear-gradient(135deg,#C0C0C0,#E8E8E8); color:#1a1a1a; }
  .rank-3 { background:linear-gradient(135deg,#CD7F32,#B87333); color:#fff; }
  .rank-other { background:#f1f5f9; color:#64748b; }
  .dark .rank-other { background:#334155; color:#94a3b8; }
  .rank-badge { width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-weight:700; font-size:.75rem; flex-shrink:0; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold text-slate-800 dark:text-white">ETF 排行榜</h1>
      <p id="update-time" class="text-xs text-slate-400 mt-0.5">資料更新中…</p>
    </div>
    <div class="flex bg-slate-100 dark:bg-slate-700 rounded-lg p-0.5">
      <button id="btn-TW" onclick="switchMarket('TW')"
        class="market-btn px-5 py-1.5 rounded-md text-sm font-semibold bg-white dark:bg-slate-600 text-slate-800 dark:text-white shadow-sm transition-all">台股</button>
      <button id="btn-US" onclick="switchMarket('US')"
        class="market-btn px-5 py-1.5 rounded-md text-sm font-semibold text-slate-400 dark:text-slate-300 transition-all">美股</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-0 border-b border-slate-200 dark:border-slate-700 mb-0 overflow-x-auto">
    <button id="tab-volume" onclick="switchRanking('volume')"
      class="rank-tab px-4 py-2.5 text-sm font-medium text-indigo-600 dark:text-indigo-400 border-b-2 border-indigo-500 -mb-px whitespace-nowrap">成交量</button>
    <button id="tab-return" onclick="switchRanking('return')"
      class="rank-tab px-4 py-2.5 text-sm font-medium text-slate-400 dark:text-slate-500 border-b-2 border-transparent -mb-px hover:text-slate-600 whitespace-nowrap">年化報酬</button>
    <button id="tab-yield" onclick="switchRanking('yield')"
      class="rank-tab px-4 py-2.5 text-sm font-medium text-slate-400 dark:text-slate-500 border-b-2 border-transparent -mb-px hover:text-slate-600 whitespace-nowrap">殖利率</button>
  </div>

  <div class="card rounded-t-none overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100 dark:border-slate-700 text-xs font-medium text-slate-400 uppercase tracking-wide">
            <th class="px-4 py-3 text-left w-10">#</th>
            <th class="px-4 py-3 text-left">ETF</th>
            <th class="px-4 py-3 text-right">現價</th>
            <th class="px-4 py-3 text-right">今日漲跌</th>
            <th class="px-4 py-3 text-right" id="rank-col-header">今日成交量</th>
            <th class="px-4 py-3 text-right hide-mobile">殖利率</th>
            <th class="px-4 py-3 w-10 hide-mobile"></th>
          </tr>
        </thead>
        <tbody id="ranking-body">
          <tr><td colspan="7" class="px-4 py-14 text-center text-slate-400 text-sm">
            <span class="spinner mr-2"></span>資料載入中…
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentRanking = 'volume', currentMarket = 'TW', allEtfData = [];

const FREQ_BADGE = {
  '月配':  'bg-blue-100 text-blue-600',
  '雙月配':'bg-cyan-100 text-cyan-600',
  '季配':  'bg-emerald-100 text-emerald-600',
  '半年配':'bg-amber-100 text-amber-600',
  '年配':  'bg-purple-100 text-purple-600',
  '不配息':'bg-slate-100 text-slate-400',
};

function payoutBadge(freq) {
  if (!freq || freq === '未知') return '';
  const cls = FREQ_BADGE[freq] || 'bg-slate-100 text-slate-400';
  return `<span class="text-[11px] px-1.5 py-0.5 rounded font-medium ${cls} ml-1.5">${freq}</span>`;
}

function fmtVol(v, market) {
  if (!v) return '-';
  if (market === 'TW') {
    const lots = Math.round(v / 1000);
    return lots >= 100000 ? (lots/10000).toFixed(1)+' 萬張' : lots.toLocaleString()+' 張';
  }
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  return v.toLocaleString();
}

function switchMarket(m) {
  currentMarket = m;
  const on  = 'market-btn px-5 py-1.5 rounded-md text-sm font-semibold bg-white dark:bg-slate-600 text-slate-800 dark:text-white shadow-sm transition-all';
  const off = 'market-btn px-5 py-1.5 rounded-md text-sm font-semibold text-slate-400 dark:text-slate-300 transition-all';
  document.getElementById('btn-TW').className = m === 'TW' ? on : off;
  document.getElementById('btn-US').className = m === 'US' ? on : off;
  switchRanking(currentRanking);
}

async function switchRanking(type) {
  currentRanking = type;
  document.querySelectorAll('.rank-tab').forEach(t => {
    t.className = 'rank-tab px-4 py-2.5 text-sm font-medium text-slate-400 dark:text-slate-500 border-b-2 border-transparent -mb-px hover:text-slate-600 whitespace-nowrap';
  });
  const tab = document.getElementById('tab-' + type);
  if (tab) tab.className = 'rank-tab px-4 py-2.5 text-sm font-medium text-indigo-600 dark:text-indigo-400 border-b-2 border-indigo-500 -mb-px whitespace-nowrap';
  const headers = { volume:'今日成交量', return:'年化報酬', yield:'殖利率' };
  document.getElementById('rank-col-header').textContent = headers[type] || '';

  document.getElementById('ranking-body').innerHTML = `<tr><td colspan="7" class="px-4 py-14 text-center text-slate-400 text-sm">
    <span class="spinner mr-2"></span>載入中…</td></tr>`;

  const data = await fetch(`/api/etf-rankings/${type}?market=${currentMarket}`).then(r=>r.json()).catch(()=>null);
  if (data?.status === 'success') {
    allEtfData = data.data || [];
    const t = data.update_time || new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('update-time').textContent = `更新於 ${t}`;
    renderTable(allEtfData, type);
  } else {
    document.getElementById('ranking-body').innerHTML = `<tr><td colspan="7" class="px-4 py-14 text-center text-slate-400 text-sm">暫無資料</td></tr>`;
  }
}

function renderTable(data, type) {
  const tbody = document.getElementById('ranking-body');
  const rows = (data || []).slice(0, 10);
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-14 text-center text-slate-400 text-sm">${allEtfData.length ? '此市場暫無資料' : '數據抓取中，請稍後重新整理頁面'}</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((item, i) => {
    const rank = i + 1;
    const bCls = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-other';
    const chg  = item.price_change_percent || 0;
    const chgCls = chg >= 0 ? 'text-red-500' : 'text-green-500';
    const price  = item.current_price ? item.current_price.toFixed(2) : '-';
    const yld    = parseFloat(item.dividend_yield) || 0;
    const yldTxt = yld > 0 ? yld.toFixed(2)+'%' : '-';
    let rankVal = '-';
    if (type === 'volume')      rankVal = fmtVol(item.volume || 0, item.market);
    else if (type === 'return') {
      const r = item.annual_return_1y || 0;
      rankVal = `<span class="${r>=0?'text-red-500':'text-green-500'}">${r>=0?'+':''}${r.toFixed(2)}%</span>`;
    } else if (type === 'yield') {
      rankVal = `<span class="${yld>0?'text-emerald-600 dark:text-emerald-400 font-medium':'text-slate-400'}">${yldTxt}</span>`;
    }
    return `
    <tr class="table-row cursor-pointer animate-fade-in" onclick="location.href='/etf-detail/${item.ticker}'">
      <td class="px-4 py-3.5"><div class="rank-badge ${bCls}">${rank}</div></td>
      <td class="px-4 py-3.5 max-w-0">
        <div class="flex items-center gap-1 flex-wrap">
          <span class="font-bold text-indigo-600 dark:text-indigo-400 text-sm">${item.ticker}</span>
          ${payoutBadge(item.payout_freq)}
        </div>
        <div class="text-xs text-slate-400 mt-0.5 truncate">${item.name||''}</div>
      </td>
      <td class="px-4 py-3.5 text-right font-semibold text-slate-800 dark:text-slate-200 tabular-nums">${price}</td>
      <td class="px-4 py-3.5 text-right font-semibold tabular-nums ${chgCls}">${chg>=0?'+':''}${chg.toFixed(2)}%</td>
      <td class="px-4 py-3.5 text-right text-slate-600 dark:text-slate-300 tabular-nums">${rankVal}</td>
      <td class="px-4 py-3.5 text-right text-emerald-600 dark:text-emerald-400 tabular-nums hide-mobile">${type!=='yield'?yldTxt:'-'}</td>
      <td class="px-4 py-3.5 text-center hide-mobile" onclick="event.stopPropagation()">
        <button data-ticker="${item.ticker}" data-name="${(item.name||'').replace(/"/g,'&quot;')}" data-market="${item.market}"
          onclick="addWatchlist(this.dataset.ticker,this.dataset.name,this.dataset.market)"
          class="w-7 h-7 rounded-md text-slate-300 dark:text-slate-600 hover:bg-yellow-50 dark:hover:bg-yellow-900/30 hover:text-yellow-500 transition-colors inline-flex items-center justify-center" title="加入自選">
          <i class="fas fa-star text-xs"></i>
        </button>
      </td>
    </tr>`;
  }).join('');
}

async function addWatchlist(ticker, name, market) {
  if (!Auth.isLoggedIn()) { showToast('請先登入', false); setTimeout(()=>location.href='/auth',1000); return; }
  const data = await Auth.fetchJson('/api/watchlist/add', {
    method: 'POST',
    body: JSON.stringify({ ticker, name, market })
  });
  showToast(data?.status==='success' ? `已加入 ${ticker}` : (data?.message||'加入失敗'), data?.status==='success');
}

document.addEventListener('DOMContentLoaded', () => {
  switchRanking('volume');
  setInterval(() => switchRanking(currentRanking), 300000);
});
</script>
{% endblock %}
